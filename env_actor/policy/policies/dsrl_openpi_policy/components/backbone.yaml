schema_version: 1

params:
  resize: true

model:
  graph:
    inputs: [images]
    modules:
      img_enc:
        _type_: dsrl_img_encoder
        resize: ${params.resize}
    nodes:
      - name: features
        call: module:img_enc
        kwargs:
          images: $images
    outputs: [$features]
    return: single
